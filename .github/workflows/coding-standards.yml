# PHP Coding Standards チェック＆自動修正
# WordPress Coding Standards に準拠しているかチェックし、PRでは自動修正してコミットする

name: Coding Standards

on:
  pull_request:
  push:
    branches:
      - main
      - develop

# 同じブランチの古いワークフローをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  phpcs:
    name: PHP Coding Standards
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCBF auto-fix
        if: github.event_name == 'pull_request'
        run: composer run-script phpcbf || true

      - name: Commit fixes
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: PHPCSによる自動修正'

      - name: Run PHPCS
        run: composer run-script phpcs -- --report=checkstyle | cs2pr
